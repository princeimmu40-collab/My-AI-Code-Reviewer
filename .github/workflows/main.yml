name: AI Code Review
on: 
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4  # Node 24 సపోర్ట్ కోసం అప్‌డేట్ చేయబడింది
      
      - name: Set up Python
        uses: actions/setup-python@v5 # Node 24 సపోర్ట్ కోసం అప్‌డేట్ చేయబడింది
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install google-generativeai requests
        
      - name: Run AI Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python script.py
